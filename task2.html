<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Музыкальный квест «Спаси ритм!» — задание «Музыкальные жанры». Научись различать песню, танец и марш, перетаскивая мелодии в правильные категории.">
    <title>Медвежонок · Музыкальные жанры</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== УНИКАЛЬНЫЕ СТИЛИ СТРАНИЦЫ ЗАДАНИЯ ===== */

        .game-wrapper {
            max-width: 1400px;
        }

        /* Жанры — зоны для перетаскивания */
        .genre-dropzones {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .genre-drop {
            background: #fff9e0;
            border-radius: 50px;
            padding: 20px 25px;
            border: 5px dashed #b3823c;
            box-shadow: 0 12px 0 #7e5826, inset 0 0 0 6px #fff0bb;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 200px;
            min-height: 240px;
            transition: all 0.2s;
            position: relative;
            cursor: default;
        }

        .genre-drop[data-genre="song"] { 
            background: #fff3d1; 
        }
        .genre-drop[data-genre="dance"] { 
            background: #ffe0f0; 
        }
        .genre-drop[data-genre="march"] { 
            background: #d9e6d3; 
        }

        .genre-drop.drag-over {
            border: 5px solid #f3ff96;
            background: #ffffd0 !important;
            transform: scale(1.02);
            box-shadow: 0 14px 0 #7e5826, inset 0 0 0 6px #fff0bb;
        }

        .genre-icon {
            font-size: 5.5rem;
            line-height: 1.2;
            filter: drop-shadow(4px 6px 0 #cfb087);
            pointer-events: none;
        }

        .genre-label {
            font-size: 2rem;
            font-weight: bold;
            background: #6b8c4a;
            color: #f9f0b8;
            padding: 8px 24px;
            border-radius: 50px;
            margin: 10px 0;
            border: 3px solid #3f6129;
            box-shadow: inset 0 2px 5px #b1d18b, 0 5px 0 #3b6026;
            pointer-events: none;
        }

        .drop-slot {
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Карточки мелодий (перетаскиваемые) */
        .music-pool {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin: 10px 0 30px;
        }

        .music-card {
            background: #ffcf8a;
            border: 6px solid #ad6d2b;
            border-radius: 60px;
            padding: 20px 25px;
            box-shadow: 0 16px 0 #7b4f1f, inset 0 0 0 6px #ffeac2;
            cursor: grab;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 200px;
            user-select: none;
            touch-action: none;
            position: relative;
        }

        .music-card:active {
            cursor: grabbing;
        }

        .music-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
            box-shadow: 0 5px 0 #7b4f1f;
        }

        .music-card .sound-icon {
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 8px;
            pointer-events: none;
        }

        .music-card .music-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #422c12;
            background: #fffde7;
            padding: 8px 16px;
            border-radius: 40px;
            border: 3px solid #a5661e;
            pointer-events: none;
        }

        .play-btn {
            margin-top: 8px;
            background: #b56532;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 5px solid #6d3f1f;
            cursor: pointer;
            transition: 0.05s linear;
            pointer-events: auto;
        }

        .play-btn:hover {
            background: #c97845;
        }

        .play-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        .play-btn.playing {
            background: #4caf50;
            border-bottom-color: #2e7d32;
            animation: playingPulse 0.5s infinite;
        }

        @keyframes playingPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Карточка в зоне */
        .placed-card {
            background: #ffcf8a;
            border-radius: 40px;
            padding: 8px 16px;
            border: 4px solid #ad6d2b;
            font-weight: bold;
            font-size: 1.3rem;
            color: #2a1d0a;
            box-shadow: inset 0 0 0 3px #ffeac2;
            margin-top: 5px;
            max-width: 180px;
            height: 120px;
            text-align: center;
            animation: placePop 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes placePop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Кнопка проверки и сообщение */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 10px;
        }

        .check-btn {
            background: #fdd673;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 18px 50px;
            border-radius: 80px;
            border: 6px solid #b8782e;
            box-shadow: 0 14px 0 #8a5a24, inset 0 0 0 6px #fff2bf;
            color: #2c4d1c;
            cursor: pointer;
            transition: 0.08s;
            margin-bottom: 20px;
        }

        .check-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 16px 0 #8a5a24, inset 0 0 0 6px #fff2bf;
        }

        .check-btn:active:not(:disabled) {
            transform: translateY(8px);
            box-shadow: 0 6px 0 #8a5a24, inset 0 0 0 6px #fff2bf;
        }

        .check-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 14px 0 #8a5a24, inset 0 0 0 6px #fff2bf;
        }

        .feedback-message {
            font-size: 2rem;
            min-height: 3.5rem;
            color: #fbf5b0;
            text-shadow: 4px 4px 0 #1c481c;
            font-weight: bold;
            text-align: center;
            transition: opacity 0.3s;
        }

        .genre-hint {
            display: inline-block;
            background: #ffecb3;
            padding: 4px 15px;
            border-radius: 40px;
            margin-top: 8px;
            font-size: 1.2rem;
            border: 2px solid #d4a843;
        }

        .reset-small {
            font-size: 1.3rem;
            background: #afd69b;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #527a3e;
            cursor: pointer;
            font-weight: bold;
            color: #1c481c;
            box-shadow: 0 6px 0 #3b642b;
            transition: 0.08s;
        }

        .reset-small:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #3b642b;
            background: #c5e6b5;
        }

        .reset-small:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #3b642b;
        }

        .progress-indicator {
            font-size: 1.5rem;
            color: #faf0b0;
            text-shadow: 2px 2px 0 #3f6d2b;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Адаптивность */
        @media (max-width: 850px) {
            .genre-drop { 
                min-width: 160px; 
                padding: 15px; 
                min-height: 200px;
            }
            .genre-icon { 
                font-size: 4rem; 
            }
            .genre-label {
                font-size: 1.5rem;
                padding: 6px 18px;
            }
            .music-card { 
                min-width: 170px; 
                padding: 15px; 
            }
            .check-btn {
                font-size: 1.8rem;
                padding: 15px 40px;
            }
            .feedback-message {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .genre-dropzones {
                gap: 20px;
            }
            .genre-drop {
                min-width: 140px;
                padding: 10px;
                min-height: 180px;
            }
            .genre-icon {
                font-size: 3rem;
            }
            .genre-label {
                font-size: 1.2rem;
                padding: 5px 15px;
            }
            .music-pool {
                gap: 20px;
            }
            .music-card {
                min-width: 150px;
                padding: 12px;
            }
            .music-card .sound-icon {
                font-size: 3rem;
            }
            .music-card .music-name {
                font-size: 1.2rem;
            }
            .play-btn {
                font-size: 1rem;
                padding: 6px 15px;
            }
            .check-btn {
                font-size: 1.5rem;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Медвежонок + речь -->
    <section class="bear-section" aria-label="Медвежонок даёт задание">
        <div class="bear-avatar" aria-hidden="true">
            <div class="bear">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
        <div class="speech-bubble">
            🐻 <strong>Ребята, будем выполнять новое задание!</strong><br>
            Музыка бывает разной: песня, марш и танец — это три главных жанра. 
            Прослушайте мелодии и перетащите карточки к подходящему жанру. 
            <span class="genre-hint">
                🎤 песня &nbsp;|&nbsp; 💃 танец &nbsp;|&nbsp; 🥁 марш
            </span>
        </div>
    </section>

    <!-- ЗОНЫ ДЛЯ ПЕРЕТАСКИВАНИЯ (жанры) -->
    <div class="genre-dropzones" role="list" aria-label="Жанры музыки">
        <!-- Песня -->
        <div class="genre-drop" data-genre="song" id="dropSong" 
             role="listitem" aria-label="Жанр: Песня" tabindex="0">
            <span class="genre-icon" aria-hidden="true">🎤</span>
            <div class="genre-label">ПЕСНЯ</div>
            <div class="drop-slot" id="slotSong" aria-live="polite"></div>
        </div>
        <!-- Танец -->
        <div class="genre-drop" data-genre="dance" id="dropDance" 
             role="listitem" aria-label="Жанр: Танец" tabindex="0">
            <span class="genre-icon" aria-hidden="true">💃</span>
            <div class="genre-label">ТАНЕЦ</div>
            <div class="drop-slot" id="slotDance" aria-live="polite"></div>
        </div>
        <!-- Марш -->
        <div class="genre-drop" data-genre="march" id="dropMarch" 
             role="listitem" aria-label="Жанр: Марш" tabindex="0">
            <span class="genre-icon" aria-hidden="true">🥁</span>
            <div class="genre-label">МАРШ</div>
            <div class="drop-slot" id="slotMarch" aria-live="polite"></div>
        </div>
    </div>

    <!-- Пул музыкальных карточек (перетаскиваемые) -->
    <div class="music-pool" id="musicPool" role="list" aria-label="Мелодии для распределения">
        <!-- Карточка 1: Итальянская полька (Танец) -->
        <div class="music-card" draggable="true" data-melody="polka" id="cardPolka"
             role="listitem" aria-label="Мелодия 1: Итальянская полька">
            <div class="sound-icon" aria-hidden="true">🎵</div>
            <div class="music-name">1</div>
            <button class="play-btn" data-play="polka" aria-label="Слушать Итальянскую польку">▶ Слушать</button>
        </div>
        <!-- Карточка 2: Марш футболистов (Марш) -->
        <div class="music-card" draggable="true" data-melody="march" id="cardMarch"
             role="listitem" aria-label="Мелодия 2: Марш футболистов">
            <div class="sound-icon" aria-hidden="true">🎵</div>
            <div class="music-name">2</div>
            <button class="play-btn" data-play="march" aria-label="Слушать Марш футболистов">▶ Слушать</button>
        </div>
        <!-- Карточка 3: Пусть всегда будет солнце (Песня) -->
        <div class="music-card" draggable="true" data-melody="song" id="cardSun"
             role="listitem" aria-label="Мелодия 3: Пусть всегда будет солнце">
            <div class="sound-icon" aria-hidden="true">🎵</div>
            <div class="music-name">3</div>
            <button class="play-btn" data-play="song" aria-label="Слушать песню Пусть всегда будет солнце">▶ Слушать</button>
        </div>
    </div>

    <!-- Кнопка проверки и обратная связь -->
    <div class="action-area">
        <div class="progress-indicator" id="progressIndicator" aria-live="polite">
            Размещено: 0 / 3
        </div>
        <button class="check-btn" id="checkAnswer" aria-label="Проверить ответ">
            🥁 ПРОВЕРИТЬ 🎤
        </button>
        <div class="feedback-message" id="feedbackMsg" aria-live="polite"></div>
        <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center;">
            <a href="index.html" class="home-link" aria-label="Вернуться на поляну">🏡 На поляну</a>
            <button class="reset-small" id="resetBtn" aria-label="Сбросить все карточки">
                🔄 Сбросить карточки
            </button>
        </div>
    </div>
</div>

<!-- Подключаем confetti в конце body -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1" defer></script>

<script>
    (function(){
        "use strict";

        // Константа — идентификатор текущего задания
        const TASK_ID = 'task2.html';

        // ---------- ЗВУК (Web Audio с fallback на HTML5 Audio) ----------
        let currentAudio = null;
        let currentPlayBtn = null;

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            if (currentPlayBtn) {
                currentPlayBtn.classList.remove('playing');
                currentPlayBtn.textContent = '▶ Слушать';
                currentPlayBtn = null;
            }
        }

        function playMelody(type, btnElement) {
            // Если нажали на ту же кнопку — останавливаем
            if (currentPlayBtn === btnElement && currentAudio && !currentAudio.paused) {
                stopCurrentAudio();
                return;
            }

            // Останавливаем предыдущее воспроизведение
            stopCurrentAudio();

            let audioFile = '';
            let melodyName = '';

            switch(type) {
                case 'polka':
                    audioFile = 'audio/Итальянская полька.mp3';
                    melodyName = 'Итальянская полька';
                    break;
                case 'march':
                    audioFile = 'audio/Футбольный марш.mp3';
                    melodyName = 'Марш футболистов';
                    break;
                case 'song':
                    audioFile = 'audio/Пусть всегда будет солнце.mp3';
                    melodyName = 'Пусть всегда будет солнце';
                    break;
                default:
                    return;
            }

            currentAudio = new Audio(audioFile);
            
            // Обработка ошибок загрузки
            currentAudio.onerror = () => {
                alert(`Не удалось загрузить мелодию "${melodyName}". Проверьте файл: ${audioFile}`);
                stopCurrentAudio();
            };

            // Визуальная обратная связь
            currentPlayBtn = btnElement;
            btnElement.classList.add('playing');
            btnElement.textContent = '⏸ Остановить';

            currentAudio.play().catch(err => {
                console.error('Ошибка воспроизведения:', err);
                alert(`Не удалось воспроизвести "${melodyName}". Попробуйте ещё раз.`);
                stopCurrentAudio();
            });

            // Когда аудио закончится — сбрасываем кнопку
            currentAudio.onended = () => {
                stopCurrentAudio();
            };
        }

        // Кнопки "Слушать"
        document.querySelectorAll('.play-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                const melody = btn.dataset.play;
                playMelody(melody, btn);
            });
        });

        // ---------- DRAG & DROP ----------
        const cards = document.querySelectorAll('.music-card');
        const dropZones = document.querySelectorAll('.genre-drop');
        const slots = {
            song: document.getElementById('slotSong'),
            dance: document.getElementById('slotDance'),
            march: document.getElementById('slotMarch')
        };

        // Сохраняем соответствие карточка -> жанр
        let currentPlacement = {
            polka: null,
            march: null,
            song: null
        };

        let isCompleted = false;

        // Функция обновления отображения слотов и прогресса
        function renderPlacements() {
            // Очищаем слоты
            for (let key in slots) {
                slots[key].innerHTML = '';
            }
            
            // Показываем или скрываем карточки
            let placedCount = 0;
            document.querySelectorAll('.music-card').forEach(card => {
                const melody = card.dataset.melody;
                if (currentPlacement[melody] !== null) {
                    card.style.display = 'none';
                    placedCount++;
                } else {
                    card.style.display = 'flex';
                }
            });

            // Обновляем индикатор прогресса
            document.getElementById('progressIndicator').textContent = 
                `Размещено: ${placedCount} / 3`;

            // Заполняем слоты
            for (let melody in currentPlacement) {
                const genre = currentPlacement[melody];
                if (genre) {
                    const slot = slots[genre];
                    if (slot) {
                        const displayDiv = document.createElement('div');
                        displayDiv.className = 'placed-card';
                        let name = '';
                        if (melody === 'polka') name = '🎵 Итальянская полька';
                        else if (melody === 'march') name = '🥁 Марш футболистов';
                        else if (melody === 'song') name = '🎤 Пусть всегда будет солнце';
                        displayDiv.textContent = name;
                        slot.appendChild(displayDiv);
                    }
                }
            }

            // Если задание выполнено — блокируем изменения
            if (isCompleted) {
                document.querySelectorAll('.music-card').forEach(c => {
                    c.draggable = false;
                });
            }
        }

        // Drag start
        cards.forEach(card => {
            card.addEventListener('dragstart', (e) => {
                if (isCompleted) {
                    e.preventDefault();
                    return;
                }
                const melody = card.dataset.melody;
                if (currentPlacement[melody] !== null) {
                    e.preventDefault();
                    return;
                }
                e.dataTransfer.setData('text/plain', melody);
                e.dataTransfer.effectAllowed = 'move';
                card.classList.add('dragging');
            });
            
            card.addEventListener('dragend', (e) => {
                card.classList.remove('dragging');
            });
        });

        // Drag over drop zones
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                if (isCompleted) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                zone.classList.add('drag-over');
            });
            
            zone.addEventListener('dragleave', (e) => {
                zone.classList.remove('drag-over');
            });
            
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                
                if (isCompleted) return;
                
                const melody = e.dataTransfer.getData('text/plain');
                if (!melody) return;

                const genre = zone.dataset.genre;
                
                // Проверяем, не занята ли уже эта карточка
                if (currentPlacement[melody] !== null) {
                    return;
                }

                // Проверяем, не занят ли слот другой карточкой
                for (let m in currentPlacement) {
                    if (currentPlacement[m] === genre) {
                        // Возвращаем старую карточку в пул
                        currentPlacement[m] = null;
                        break;
                    }
                }

                // Сохраняем размещение
                currentPlacement[melody] = genre;
                renderPlacements();
                
                // Очищаем сообщение
                document.getElementById('feedbackMsg').textContent = '';
            });
        });

        // ===== TOUCH SUPPORT =====
        let draggedElement = null;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchOffsetX = 0;
        let touchOffsetY = 0;
        let originalPosition = null;

        cards.forEach(card => {
            card.addEventListener('touchstart', (e) => {
                if (isCompleted) return;
                const melody = card.dataset.melody;
                if (currentPlacement[melody] !== null) return;
                
                // Не перетаскиваем, если нажали на кнопку
                if (e.target.classList.contains('play-btn')) return;
                
                draggedElement = card;
                const touch = e.touches[0];
                const rect = card.getBoundingClientRect();
                touchOffsetX = touch.clientX - rect.left;
                touchOffsetY = touch.clientY - rect.top;
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                
                originalPosition = {
                    position: card.style.position,
                    top: card.style.top,
                    left: card.style.left,
                    zIndex: card.style.zIndex
                };
                
                card.style.position = 'fixed';
                card.style.zIndex = '1000';
                card.style.top = (touch.clientY - touchOffsetY) + 'px';
                card.style.left = (touch.clientX - touchOffsetX) + 'px';
                card.classList.add('dragging');
                
                e.preventDefault();
            });

            card.addEventListener('touchmove', (e) => {
                if (!draggedElement || draggedElement !== card) return;
                
                const touch = e.touches[0];
                card.style.top = (touch.clientY - touchOffsetY) + 'px';
                card.style.left = (touch.clientX - touchOffsetX) + 'px';
                
                // Подсветка зон при наведении
                const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
                dropZones.forEach(z => z.classList.remove('drag-over'));
                if (elementUnder) {
                    const dropZone = elementUnder.closest('.genre-drop');
                    if (dropZone) {
                        dropZone.classList.add('drag-over');
                    }
                }
                
                e.preventDefault();
            });

            card.addEventListener('touchend', (e) => {
                if (!draggedElement || draggedElement !== card) return;
                
                dropZones.forEach(z => z.classList.remove('drag-over'));
                
                const touch = e.changedTouches[0];
                const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
                
                if (elementUnder) {
                    const dropZone = elementUnder.closest('.genre-drop');
                    if (dropZone) {
                        const genre = dropZone.dataset.genre;
                        const melody = card.dataset.melody;
                        
                        // Освобождаем занятый слот
                        for (let m in currentPlacement) {
                            if (currentPlacement[m] === genre) {
                                currentPlacement[m] = null;
                                break;
                            }
                        }
                        
                        currentPlacement[melody] = genre;
                        renderPlacements();
                        document.getElementById('feedbackMsg').textContent = '';
                    }
                }
                
                // Возвращаем карточку
                card.style.position = originalPosition?.position || '';
                card.style.top = originalPosition?.top || '';
                card.style.left = originalPosition?.left || '';
                card.style.zIndex = originalPosition?.zIndex || '';
                card.classList.remove('dragging');
                
                draggedElement = null;
                originalPosition = null;
            });
        });

        // Предотвращаем стандартное поведение
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => e.preventDefault());

        // Сброс размещений
        function resetPlacements() {
            stopCurrentAudio();
            isCompleted = false;
            currentPlacement = { polka: null, march: null, song: null };
            renderPlacements();
            document.getElementById('feedbackMsg').textContent = '';
            document.getElementById('checkAnswer').disabled = false;
            
            // Возвращаем draggable
            document.querySelectorAll('.music-card').forEach(c => {
                c.draggable = true;
            });
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (isCompleted || Object.values(currentPlacement).some(v => v !== null)) {
                resetPlacements();
            }
        });

        // Проверка ответа
        const correctMap = {
            polka: 'dance',
            march: 'march',
            song: 'song'
        };

        function fireConfetti() {
            if (typeof confetti !== 'function') {
                console.warn('Confetti ещё не загружен');
                return;
            }
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 }
            });
            
            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6, x: 0.3 }
                });
            }, 100);
            
            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6, x: 0.7 }
                });
            }, 200);
        }

        // Сохраняем прогресс в localStorage
        function completeTask() {
            const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');

            if (!completedTasks.includes(TASK_ID)) {
                completedTasks.push(TASK_ID);
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }

        document.getElementById('checkAnswer').addEventListener('click', () => {
            const msgDiv = document.getElementById('feedbackMsg');

            // Проверяем, все ли три размещены
            const placedCount = Object.values(currentPlacement).filter(v => v !== null).length;
            if (placedCount < 3) {
                msgDiv.textContent = `🐾 Распредели все три мелодии! Осталось: ${3 - placedCount}`;
                return;
            }

            let allCorrect = true;
            for (let melody in correctMap) {
                if (currentPlacement[melody] !== correctMap[melody]) {
                    allCorrect = false;
                    break;
                }
            }

            if (allCorrect) {
                isCompleted = true;
                msgDiv.textContent = '🎉 Ура! Всё верно! Ритм возвращается! 🎉';
                stopCurrentAudio();

                // Блокируем перетаскивание
                document.querySelectorAll('.music-card').forEach(c => {
                    c.draggable = false;
                });

                // Всегда показываем конфетти, но сохраняем прогресс только один раз
                fireConfetti();
                completeTask(); // completeTask сама проверит, сохранять ли прогресс
            } else {
                msgDiv.textContent = '🤔 Попробуй ещё раз! Послушай внимательно.';
                // Если неправильно — сбрасываем блокировку, чтобы можно было исправить
                isCompleted = false;
            }
        });

        // Клавиатурное управление для зон
        dropZones.forEach(zone => {
            zone.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    // Активируем зону для следующего перетаскивания
                    zone.classList.add('drag-over');
                    setTimeout(() => zone.classList.remove('drag-over'), 500);
                }
            });
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderPlacements();

        // Проверяем, было ли задание уже выполнено
        const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
        if (completedTasks.includes(TASK_ID)) {
            // Если уже выполнено — показываем результат
            isCompleted = true;
            currentPlacement = {
                polka: 'dance',
                march: 'march',
                song: 'song'
            };
            renderPlacements();
            document.getElementById('feedbackMsg').textContent = '🎉 Это задание уже выполнено! Молодцы! 🎉';
            document.getElementById('checkAnswer').disabled = true;
            document.querySelectorAll('.music-card').forEach(c => {
                c.draggable = false;
            });
        }
    })();
</script>
</body>
</html>
