<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐻 Медвежонок · Станция №4 · Ритмы</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard', 'Nunito', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1f4d2b 0%, #3b6e49 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="30" viewBox="0 0 28 30"><circle cx="14" cy="13" r="12" fill="%23ffdb7c" stroke="%23955c1e" stroke-width="2.8"/><circle cx="9" cy="9" r="2.2" fill="black"/><circle cx="19" cy="9" r="2.2" fill="black"/><ellipse cx="14" cy="18" rx="5.5" ry="2.8" fill="%23955c1e" /></svg>') 14 13, auto;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #6c9e5f;
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.6), inset 0 0 30px #c6e6a3;
            padding: 25px 25px 35px 25px;
            border: 8px solid #4f7542;
        }

        /* Секция песен */
        .songs-section {
            background: #fef7e0;
            border-radius: 60px;
            padding: 25px 20px;
            margin: 15px 0 25px;
            border: 5px solid #d4a354;
            box-shadow: 0 12px 0 #9e7a42, inset 0 0 20px #ffe3a5;
        }

        .songs-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #4a3822;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #f0d9a0;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .song-card {
            background: #fff9ec;
            border-radius: 35px;
            padding: 20px 15px;
            border: 4px solid #c9a04b;
            box-shadow: 0 8px 0 #876f38, inset 0 0 0 4px #feeec8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: 0.1s ease;
        }

        .song-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3e3a1f;
            text-align: center;
            background: #f5e5c8;
            width: 100%;
            height: 100%;
            padding: 10px;
            
            border-radius: 25px;
        }

        .song-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .song-btn {
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .listen-btn {
            margin-top: 8px;
            background: #b56532;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 5px solid #6d3f1f;
            cursor: pointer;
            transition: 0.05s linear;
            pointer-events: auto;
        }

        .choose-btn {
            background: #f7b05e;
            color: #3d2c14;
            border-bottom: 4px solid #b46f2c;
        }

        .song-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .feedback-message {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 15px;
            font-weight: bold;
            min-height: 50px;
        }

        /* Медвежонок */
        .bear-task-section {
            background: #8fc27c;
            border-radius: 100px 100px 50px 50px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 6px solid #fdebbc;
            box-shadow: 0 15px 0 #3b642b, inset 0 0 30px #e9f7d3;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bear-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 160px;
        }

        .bear-avatar .bear {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #d49d62, #7b4d27);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 15px 0 #5f3e22, inset -10px -12px 15px #8b602f;
            border: 5px solid #573e22;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .bear-avatar .ear {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #b8804a;
            border-radius: 70% 70% 60% 60%;
            top: -30px;
            border: 5px solid #573e22;
            transition: transform 0.2s;
        }
        .bear-avatar .ear.left { left: 1px; transform: rotate(-25deg); }
        .bear-avatar .ear.right { right: 1px; transform: rotate(25deg); }

        .bear-avatar .face {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bear-avatar .eyes {
            display: flex;
            gap: 32px;
        }
        .bear-avatar .eye {
            width: 20px;
            height: 25px;
            background: white;
            border-radius: 50%;
            border: 3px solid #2d1d0c;
            position: relative;
        }
        .bear-avatar .eye::after {
            content: '';
            width: 12px;
            height: 13px;
            background: #2f1f0e;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
        }
        .bear-avatar .nose {
            width: 30px;
            height: 20px;
            background: #4b3119;
            border-radius: 40% 40% 50% 50%;
            border: 3px solid #2d1d0c;
            margin-top: 7px;
        }

        .speech-bubble {
            position: relative;
            background: #ffffec;
            border-radius: 60px 60px 60px 40px;
            padding: 30px 40px;
            border: 6px solid #6d4f2c;
            box-shadow: 15px 18px 0 rgba(0, 0, 0, 0.2), inset 0 0 0 5px #fffed8;
            max-width: 700px;
            font-size: 1.6rem;
            line-height: 1.5;
            color: #203d16;
            font-weight: 600;
            flex: 1;
            min-width: 300px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -30px;
            bottom: 30px;
            width: 50px;
            height: 50px;
            background: #ffffec;
            border-radius: 50%;
            border: 6px solid #6d4f2c;
            border-top-color: transparent;
            border-right-color: transparent;
            transform: rotate(45deg);
            box-shadow: -8px 8px 0 rgba(0,0,0,0.1);
        }

        .rhythm-section {
            background: #fdf5d6;
            border-radius: 60px;
            padding: 35px 30px;
            margin: 20px 0;
            border: 5px solid #bc9b5a;
            box-shadow: 0 10px 0 #7a6234, inset 0 0 0 6px #fff3c9;
        }

        .rhythm-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #4a3f35;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0 #e8d5b5;
        }

        .rhythm-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .rhythm-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff1d2;
            padding: 15px 25px;
            border-radius: 40px;
            border: 4px solid #a67934;
            box-shadow: inset 0 0 0 4px #ffe3a5, 0 6px 0 #846f3e;
            min-width: 110px;
        }

        .rhythm-syllable {
            font-size: 2.0rem;
            font-weight: bold;
            color: #5a4a3a;
        }

        .rhythm-fruit {
            font-size: 2.0rem;
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
        }

        .legend-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff9e0;
            padding: 12px 25px;
            border-radius: 40px;
            border: 3px solid #b3823c;
        }

        .legend-fruit {
            font-size: 2.5rem;
        }

        .legend-text {
            font-size: 1.3rem;
            color: #3a2e22;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .nav-btn {
            background: #fdd673;
            font-size: 2rem;
            font-weight: bold;
            padding: 15px 45px;
            border-radius: 60px;
            border: 6px solid #b8782e;
            box-shadow: 0 12px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
            color: #2c4d1c;
            cursor: pointer;
            transition: 0.08s;
            user-select: none;
        }

        .nav-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 12px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
            cursor: not-allowed;
        }

        .counter {
            font-size: 1.8rem;
            color: #faf0b0;
            text-shadow: 3px 3px 0 #3f6d2b;
            margin: 10px 0;
        }

        .home-link {
            display: inline-block;
            margin-top: 10px;
            background: #fdebbc;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.6rem;
            color: #284f18;
            border: 5px solid #a57c42;
            box-shadow: 0 8px 0 #6d4f1e;
            text-decoration: none;
            font-weight: bold;
        }

        .play-btn {
            background: #b56532;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 6px solid #6d3f1f;
            cursor: pointer;
            margin: 10px 0;
        }

        .play-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }
        .complete-message {
            text-align: center;
            font-size: 2rem;
            color: #fbf5b0;
            text-shadow: 3px 3px 0 #1c481c;
            margin: 20px 0;
        }

        @media (max-width: 800px) {
            .bear-task-section { flex-direction: column; }
            .speech-bubble { font-size: 1.3rem; padding: 20px; }
            .speech-bubble::after { left: 40px; top: -25px; transform: rotate(135deg); }
            .rhythm-item { min-width: 80px; padding: 10px 15px; }
            .nav-btn { font-size: 1.5rem; padding: 12px 30px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    

    <!-- МЕДВЕЖОНОК + СООБЩЕНИЕ -->
    <div class="bear-task-section">
        <div class="bear-avatar">
            <div class="bear" id="bearHead">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
        <div class="speech-bubble" id="messageBubble">
            🐻 Сегодня мы продолжаем нашу ответственную миссию!<br>
            В этом году вы учили три песни: ко дню учителя, ко дню матери и к 23 февраля. 
            <br>Помните?  
        </div>
    </div>
    
    <!-- ВЫБОР ПЕСНИ -->
    <div class="songs-section" id="songsSection">
        <div class="songs-title">🎶 Какая песня подходит к ритму? 🎶</div>
        <div class="songs-grid" id="songsGrid">
            <!-- Заполняется динамически -->
        </div>
        <div id="songFeedback" class="feedback-message"></div>
    </div>

    <!-- РИТМИЧЕСКИЙ РИСУНОК -->
    <div class="rhythm-section" id="rhythmDisplay">
        <div class="rhythm-title" id="rhythmTitle">🎵 Ритм 1 🎵</div>
        <div class="rhythm-row" id="rhythmRow"></div>
        <div style="text-align: center;">
            <button class="play-btn" id="playRhythmBtn">🥁 Простучать ритм</button>
        </div>
    </div>

    <!-- ЛЕГЕНДА -->
    <div class="legend-box" id="legendContainer"></div>

    <!-- НАВИГАЦИЯ -->
    <div class="action-area">
        <div class="counter" id="counterDisplay">1 / 3</div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>◀ НАЗАД</button>
            <button class="nav-btn" id="nextBtn">ВПЕРЁД ▶</button>
        </div>
        <div id="completionMessage" class="complete-message"></div>
        <a href="index.html?level=1" class="home-link">🏡 На поляну</a>
    </div>
</div>

<script>
    (function(){
        // ----- ДАННЫЕ ПЕСЕН (аудио-заглушки с помощью Web Audio) -----
        const songs = [
            {
                id: 'teacher',
                name: '🍎 Песня ко Дню учителя',
                // Мелодия из 4 нот (частоты)
                melody: [523.25, 587.33, 659.25, 698.46], // C5 D5 E5 F5
            },
            {
                id: 'mother',
                name: '🌸 Песня ко Дню матери',
                melody: [392.00, 440.00, 493.88, 523.25], // G4 A4 B4 C5
            },
            {
                id: 'february',
                name: '⭐ Песня к 23 февраля',
                melody: [261.63, 329.63, 392.00, 440.00], // C4 E4 G4 A4
            },
            {
                id: 'newyear',
                name: '🎄 Новогодняя песня',
                melody: [349.23, 392.00, 440.00, 493.88], // F4 G4 A4 B4
            }
        ];

        // ----- РИТМЫ (каждый ритм соответствует одной песне) -----
        const rhythms = [
            {   // Ритм 1 -> День учителя (teacher)
                title: '🎵 Ритм 1 🎵',
                longSymbol: '🟩',
                shortSymbol: '🟡',
                correctSongId: 'teacher',
                sequence: [
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' },
                    { type: 'long', symbol: '🟩', syllable: 'ТА' }
                ],
                legendLong: '🟩',
                legendShort: '🟡',
            },
            {   // Ритм 2 -> День матери (mother)
                title: '🎵 Ритм 2 🎵',
                longSymbol: '🟨',
                shortSymbol: '🔴',
                correctSongId: 'mother',
                sequence: [
                    { type: 'long', symbol: '🟨', syllable: 'ТА' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟨', syllable: 'ТА' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔴', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟨', syllable: 'ТА' },
                    { type: 'long', symbol: '🟨', syllable: 'ТА' }
                ],
                legendLong: '🟨',
                legendShort: '🔴',
            },
            {   // Ритм 3 -> 23 февраля (february)
                title: '🎵 Ритм 3 🎵',
                longSymbol: '🟪',
                shortSymbol: '🔵',
                correctSongId: 'february',
                sequence: [
                    { type: 'long', symbol: '🟪', syllable: 'ТА' },
                    { type: 'long', symbol: '🟪', syllable: 'ТА' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟪', syllable: 'ТА' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'short', symbol: '🔵', syllable: 'ТИ' },
                    { type: 'long', symbol: '🟪', syllable: 'ТА' }
                ],
                legendLong: '🟪',
                legendShort: '🔵',
            }
        ];

        // Общие тексты для легенды
        const legendTextLong = 'Длинный звук (ТА) — шлёпаем по коленкам';
        const legendTextShort = 'Короткий звук (ТИ) — хлопаем в ладоши';

        let currentIndex = 0;
        const rhythmTitle = document.getElementById('rhythmTitle');
        const rhythmRow = document.getElementById('rhythmRow');
        const legendContainer = document.getElementById('legendContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counterDisplay = document.getElementById('counterDisplay');
        const completionMessage = document.getElementById('completionMessage');
        const messageBubble = document.getElementById('messageBubble');
        const playBtn = document.getElementById('playRhythmBtn');
        const songsGrid = document.getElementById('songsGrid');
        const songFeedback = document.getElementById('songFeedback');

        // Функция воспроизведения мелодии песни
        function playSongMelody(song) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;
            
            song.melody.forEach((freq, index) => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.2, now + index * 0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + index * 0.3 + 0.25);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now + index * 0.3);
                osc.stop(now + index * 0.3 + 0.28);
            });
        }

        // Проверка выбора песни
        function checkSongSelection(songId) {
            const currentRhythm = rhythms[currentIndex];
            if (songId === currentRhythm.correctSongId) {
                songFeedback.innerHTML = '🎉 Браво! Ритмы подобраны верно! 🎉';
                songFeedback.style.color = '#2d6a1e';
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.5 } });
                }
            } else {
                songFeedback.innerHTML = '🤔 Попробуй еще раз. Послушай внимательнее.';
                songFeedback.style.color = '#b13e3e';
            }
        }

        // Создание сетки песен
        function renderSongs() {
            let html = '';
            songs.forEach(song => {
                html += `
                    <div class="song-card">
                        <div class="song-name">${song.name}</div>
                        <div class="song-buttons">
                            <button class="song-btn listen-btn" data-song-id="${song.id}">▶ Слушать</button>
                            <button class="song-btn choose-btn" data-song-id="${song.id}">✅ Выбрать</button>
                        </div>
                    </div>
                `;
            });
            songsGrid.innerHTML = html;
            songFeedback.innerHTML = '';

            // Назначаем обработчики
            document.querySelectorAll('.listen-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-song-id');
                    const song = songs.find(s => s.id === id);
                    if (song) playSongMelody(song);
                });
            });

            document.querySelectorAll('.choose-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-song-id');
                    checkSongSelection(id);
                });
            });
        }

        // Обновление легенды
        function updateLegend(rhythm) {
            legendContainer.innerHTML = `
                <div class="legend-item">
                    <div class="legend-fruit">${rhythm.longSymbol}</div>
                    <div class="legend-text">${legendTextLong}</div>
                </div>
                <div class="legend-item">
                    <div class="legend-fruit">${rhythm.shortSymbol}</div>
                    <div class="legend-text">${legendTextShort}</div>
                </div>
            `;
        }

        // Проигрывание ритма
        function playCurrentRhythm() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;
            const rhythm = rhythms[currentIndex];
            
            function scheduleTone(time, isLong) {
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = isLong ? 620 : 1050;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.25, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + (isLong ? 0.28 : 0.09));
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + (isLong ? 0.32 : 0.12));
            }

            let timeOffset = 0;
            rhythm.sequence.forEach(item => {
                const isLong = item.type === 'long';
                scheduleTone(now + timeOffset, isLong);
                timeOffset += isLong ? 0.45 : 0.22;
            });
        }

        // Отрисовка ритма
        function renderRhythm() {
            const rhythm = rhythms[currentIndex];
            rhythmTitle.textContent = rhythm.title;
            
            let html = '';
            rhythm.sequence.forEach(item => {
                html += `
                    <div class="rhythm-item">
                        <div class="rhythm-syllable">${item.syllable}</div>
                        <div class="rhythm-fruit">${item.symbol}</div>
                    </div>
                `;
            });
            rhythmRow.innerHTML = html;
            updateLegend(rhythm);
            counterDisplay.textContent = `${currentIndex + 1} / ${rhythms.length}`;
            prevBtn.disabled = currentIndex === 0;
            
            if (currentIndex === rhythms.length - 1) {
                nextBtn.textContent = '🏁 ЗАВЕРШИТЬ';
            } else {
                nextBtn.textContent = 'ВПЕРЁД ▶';
            }
            
            songFeedback.innerHTML = '';
            
            if (currentIndex === 0) {
                messageBubble.innerHTML = `🐻 Сегодня мы продолжаем нашу ответственную миссию!<br>
В этом году вы учили три песни:<br> ко <strong>дню учителя</strong>, ко <strong>дню матери</strong> и к <strong>23 февраля</strong>. 
Помните?  <br>
Сейчас вы услышите три ритмических рисунка. Необходимо понять, к какой из трёх песен принадлежит каждый.`;
            } else if (currentIndex === 1) {
                messageBubble.innerHTML = `🐻 <strong>Отлично получается!</strong><br>А вот второй ритм. Какая песня ему соответствует?`;
            } else {
                messageBubble.innerHTML = `🐻 <strong>Последний ритм!</strong><br>Он самый сложный. Справитесь?`;
            }
        }

        // Навигация
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderRhythm();
                completionMessage.textContent = '';
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < rhythms.length - 1) {
                currentIndex++;
                renderRhythm();
                completionMessage.textContent = '';
            } else if (currentIndex === rhythms.length - 1) {
                completionMessage.textContent = '🎉 Отлично! Задание выполнено! 🎉';
                nextBtn.disabled = true;
                prevBtn.disabled = true;
                messageBubble.innerHTML = `🐻 <strong>Молодцы, ребята!</strong><br>Вы отлично справились с ритмами! Возвращайтесь на поляну за следующим заданием.`;
                if (typeof confetti === 'function') {
                    confetti({particleCount: 130, spread: 80});
                    setTimeout(() => confetti({particleCount: 90}), 200);
                }
            }
        });

        playBtn.addEventListener('click', () => {
            playCurrentRhythm();
            playBtn.style.transform = 'scale(0.94)';
            setTimeout(() => { playBtn.style.transform = ''; }, 120);
        });

        // Анимация ушек
        const bear = document.getElementById('bearHead');
        if (bear) {
            bear.addEventListener('mouseenter', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-15deg) scale(1.05)';
                    else e.style.transform = 'rotate(15deg) scale(1.05)';
                });
            });
            bear.addEventListener('mouseleave', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-25deg)';
                    else e.style.transform = 'rotate(25deg)';
                });
            });
        }

        // Инициализация
        renderSongs();
        renderRhythm();
    })();
</script>
</body>
</html>
