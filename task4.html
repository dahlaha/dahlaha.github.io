<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Музыкальный квест «Спаси ритм!» — задание №4. Сопоставьте ритмические рисунки с песнями, которые вы учили в этом году.">
    <title>🐻 Медвежонок · Станция №4 · Ритмы</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== УНИКАЛЬНЫЕ СТИЛИ СТРАНИЦЫ ЗАДАНИЯ ===== */

        .game-wrapper {
            max-width: 1300px;
        }

        /* Секция песен */
        .songs-section {
            background: #fef7e0;
            border-radius: 60px;
            padding: 25px 20px;
            margin: 15px 0 25px;
            border: 5px solid #d4a354;
            box-shadow: 0 12px 0 #9e7a42, inset 0 0 20px #ffe3a5;
        }

        .songs-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #4a3822;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #f0d9a0;
        }

        .songs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .song-card {
            background: #fff9ec;
            border-radius: 35px;
            padding: 20px 15px;
            border: 4px solid #c9a04b;
            box-shadow: 0 8px 0 #876f38, inset 0 0 0 4px #feeec8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
        }

        .song-card.selected {
            background: #d4edda;
            border-color: #4caf50;
            box-shadow: 0 8px 0 #2e7d32, inset 0 0 0 4px #a5d6a7;
            transform: scale(1.02);
        }

        .song-card.correct {
            background: #c8e6c9;
            border-color: #388e3c;
            box-shadow: 0 8px 0 #1b5e20, inset 0 0 0 4px #81c784;
            animation: correctPulse 0.6s ease;
        }

        .song-card.incorrect {
            background: #ffcdd2;
            border-color: #d32f2f;
            box-shadow: 0 8px 0 #b71c1c, inset 0 0 0 4px #ef9a9a;
            animation: shake 0.5s ease;
        }

        .song-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3e3a1f;
            text-align: center;
            background: #f5e5c8;
            width: 100%;
            padding: 12px 10px;
            border-radius: 25px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .song-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .song-btn {
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .listen-btn {
            background: #b56532;
            color: white;
            border-bottom: 4px solid #6d3f1f;
        }

        .listen-btn:hover {
            background: #c97845;
        }

        .listen-btn.playing {
            background: #4caf50;
            border-bottom-color: #2e7d32;
            animation: playingPulse 0.5s infinite;
        }

        .choose-btn {
            background: #f7b05e;
            color: #3d2c14;
            border-bottom: 4px solid #b46f2c;
        }

        .choose-btn:hover {
            background: #f9c47d;
        }

        .song-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        .feedback-message {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 15px;
            font-weight: bold;
            min-height: 50px;
            transition: all 0.3s;
        }

        /* Ритмический рисунок */
        .rhythm-section {
            background: #fdf5d6;
            border-radius: 60px;
            padding: 35px 30px;
            margin: 20px 0;
            border: 5px solid #bc9b5a;
            box-shadow: 0 10px 0 #7a6234, inset 0 0 0 6px #fff3c9;
        }

        .rhythm-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #4a3f35;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0 #e8d5b5;
            outline: none;
        }

        .rhythm-list {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
            list-style: none;
            padding: 0;
        }

        .rhythm-group {
            display: inline-flex;
            gap: 15px;
            flex-wrap: nowrap;
        }

        .rhythm-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff1d2;
            padding: 10px 15px;
            border-radius: 35px;
            border: 4px solid #a67934;
            box-shadow: inset 0 0 0 4px #ffe3a5, 0 6px 0 #846f3e;
            min-width: 87px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .rhythm-item.long {
            background: #fff9e0;
            border-color: #8b6914;
        }

        .rhythm-item.short {
            background: #ffe8e0;
            border-color: #c44d34;
        }

        .rhythm-item.spacer {
            opacity: 0;
            pointer-events: none;
            min-width: 15px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .rhythm-syllable {
            font-size: 2.0rem;
            font-weight: bold;
            color: #5a4a3a;
        }

        .rhythm-fruit {
            font-size: 2.0rem;
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
        }

        .legend-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff9e0;
            padding: 12px 25px;
            border-radius: 40px;
            border: 3px solid #b3823c;
        }

        .legend-fruit {
            font-size: 2.5rem;
        }

        .legend-text {
            font-size: 1.3rem;
            color: #3a2e22;
        }

        /* Кнопки */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #fdd673;
            font-size: 2rem;
            font-weight: bold;
            padding: 15px 45px;
            border-radius: 60px;
            border: 6px solid #b8782e;
            box-shadow: 0 12px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
            color: #2c4d1c;
            cursor: pointer;
            transition: 0.08s;
            user-select: none;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 14px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 12px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
            cursor: not-allowed;
        }

        .counter {
            font-size: 1.8rem;
            color: #faf0b0;
            text-shadow: 3px 3px 0 #3f6d2b;
            margin: 10px 0;
            font-weight: bold;
        }

        .home-link {
            display: inline-block;
            margin-top: 10px;
            background: #fdebbc;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.6rem;
            color: #284f18;
            border: 5px solid #a57c42;
            box-shadow: 0 8px 0 #6d4f1e;
            text-decoration: none;
            font-weight: bold;
            transition: 0.08s;
        }

        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #6d4f1e;
        }

        .play-btn {
            background: #b56532;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 6px solid #6d3f1f;
            cursor: pointer;
            margin: 10px 0;
            transition: 0.08s;
        }

        .play-btn:hover {
            background: #c97845;
        }

        .play-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        .play-btn.playing {
            background: #4caf50;
            border-bottom-color: #2e7d32;
            animation: playingPulse 0.5s infinite;
        }

        .complete-message {
            text-align: center;
            font-size: 2rem;
            color: #fbf5b0;
            text-shadow: 3px 3px 0 #1c481c;
            margin: 20px 0;
            min-height: 60px;
        }

        .reset-btn {
            font-size: 1.2rem;
            background: #afd69b;
            padding: 8px 25px;
            border-radius: 40px;
            border: 4px solid #527a3e;
            cursor: pointer;
            font-weight: bold;
            color: #1c481c;
            box-shadow: 0 6px 0 #3b642b;
            transition: 0.08s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #3b642b;
            background: #c5e6b5;
        }

        /* Адаптивность */
        @media (max-width: 800px) {
            .songs-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 15px;
            }
            .rhythm-item { 
                min-width: 80px; 
                padding: 10px 15px; 
            }
            .rhythm-syllable { 
                font-size: 1.5rem; 
            }
            .rhythm-fruit { 
                font-size: 1.5rem; 
            }
            .nav-btn { 
                font-size: 1.5rem; 
                padding: 12px 30px; 
            }
            .play-btn {
                font-size: 1.2rem;
                padding: 12px 25px;
            }
            .legend-text {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .songs-grid {
                grid-template-columns: 1fr;
            }
            .rhythm-list {
                gap: 8px;
            }
            .rhythm-item {
                min-width: 60px;
                padding: 8px 10px;
            }
        }
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes playingPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- МЕДВЕЖОНОК + СООБЩЕНИЕ -->
    <section class="bear-section" aria-label="Медвежонок даёт задание">
        <div class="bear-avatar" aria-hidden="true">
            <div class="bear" id="bearHead">
                <div class="ear left"></div>

        <div style="text-align: center;">
            <button class="play-btn" id="playRhythmBtn" aria-label="Простучать ритм">🥁 Простучать ритм</button>
        </div>

    <!-- ЛЕГЕНДА -->

        </div>
        <div id="completionMessage" class="complete-message" aria-live="polite"></div>
        <button class="reset-btn" id="resetBtn" style="display: none;" aria-label="Пройти задание заново">🔄 Пройти заново</button>
        <a href="index.html?level=1" class="home-link" aria-label="Вернуться на поляну">🏡 На поляну</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1" defer></script>

<script>

                    { type: 'long', symbol: '🟩', syllable: 'ТА' },

                    { type: 'short', symbol: '🟡', syllable: 'ТИ' },

                ],
                legendLong: '🟩',

                message: `🐻 Сегодня мы продолжаем нашу ответственную миссию!<br>
В этом году вы учили три песни:<br> ко <strong>дню учителя</strong>, ко <strong>дню матери</strong> и к <strong>23 февраля</strong>.

            },
            {

            },
            {

        const legendTextLong = 'Длинный звук (ТА) — шлёпаем по коленкам';

        const legendContainer = document.getElementById('legendContainer');

        function saveProgress() {
            const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
            if (!completedTasks.includes(TASK_ID)) {
                completedTasks.push(TASK_ID);
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }

        function fireConfetti() {
            if (typeof confetti !== 'function') {
                console.warn('Confetti ещё не загружен');
                return;
            }
            
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            setTimeout(() => confetti({ particleCount: 120, spread: 80, origin: { y: 0.6, x: 0.3 } }), 100);
            setTimeout(() => confetti({ particleCount: 120, spread: 80, origin: { y: 0.6, x: 0.7 } }), 200);
        }

        /**
         * Воспроизводит MP3-файл песни
         * @param {object} song - объект песни с полем mp3File
         * @param {HTMLElement} btnElement - кнопка для визуальной обратной связи
         */
        function playSongMP3(song, btnElement) {
            // Останавливаем предыдущее аудио, если есть
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                // Убираем класс playing со всех кнопок
                document.querySelectorAll('.listen-btn.playing').forEach(btn => {
                    btn.classList.remove('playing');
                    btn.textContent = '▶ Слушать';
                });
            }

            try {
                const audio = new Audio(song.mp3File);
                currentAudio = audio;
                
                // Визуальная обратная связь на кнопке
                if (btnElement) {
                    btnElement.classList.add('playing');
                    btnElement.textContent = '🔊 Играет...';
                }
                
                // Воспроизводим
                audio.play().catch(err => {
                    console.error('Ошибка воспроизведения MP3:', err);
                    if (btnElement) {
                        btnElement.classList.remove('playing');
                        btnElement.textContent = '▶ Слушать';
                    }
                    currentAudio = null;
                });
                
                // Событие окончания воспроизведения
                audio.addEventListener('ended', () => {
                    if (btnElement) {
                        btnElement.classList.remove('playing');
                        btnElement.textContent = '▶ Слушать';
                    }
                    currentAudio = null;
                });
                
                // На случай ошибки
                audio.addEventListener('error', (e) => {
                    console.error('Ошибка загрузки аудио:', e);
                    if (btnElement) {
                        btnElement.classList.remove('playing');
                        btnElement.textContent = '▶ Слушать';
                    }
                    currentAudio = null;
                });
                
            } catch (error) {
                console.error('Ошибка создания Audio:', error);
                if (btnElement) {
                    btnElement.classList.remove('playing');
                    btnElement.textContent = '▶ Слушать';
                }
                currentAudio = null;
            }
        }

        /**
         * Воспроизводит мелодию песни синтезированным звуком (запасной вариант)
         * @param {object} song - объект песни с полем melody
         * @param {HTMLElement} btnElement - кнопка для визуальной обратной связи
         */
        function playSongMelody(song, btnElement) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => playNotes(ctx, song, btnElement));
                } else {
                    playNotes(ctx, song, btnElement);
                }
            } catch (error) {
                console.error('Ошибка воспроизведения:', error);
            }
        }

        function playNotes(ctx, song, btnElement) {
            const now = ctx.currentTime;
            
            // Визуальная обратная связь
            if (btnElement) {
                btnElement.classList.add('playing');
                btnElement.textContent = '🔊 Играет...';
            }
            
            song.melody.forEach((freq, index) => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.2, now + index * 0.3);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + index * 0.3 + 0.25);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now + index * 0.3);
                osc.stop(now + index * 0.3 + 0.28);
            });
            
            // Сброс кнопки после воспроизведения
            setTimeout(() => {
                if (btnElement) {
                    btnElement.classList.remove('playing');
                    btnElement.textContent = '▶ Слушать';
                }
                ctx.close();
            }, song.melody.length * 300 + 300);
        }

        /**
         * Воспроизводит MP3 или синтезированную мелодию в зависимости от наличия файла
         */
        function playSong(song, btnElement) {
            if (song.mp3File) {
                playSongMP3(song, btnElement);
            } else {
                playSongMelody(song, btnElement);
            }
        }

        function playCurrentRhythm() {
            if (isPlaying) return;
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => playRhythm(ctx));
                } else {
                    playRhythm(ctx);
                }
            } catch (error) {
                console.error('Ошибка воспроизведения:', error);
            }
        }

        function playRhythm(ctx) {
            isPlaying = true;
            playBtn.classList.add('playing');
            playBtn.textContent = '🔊 Играет...';
            
            const now = ctx.currentTime;
            const rhythm = rhythms[currentIndex];
            
            let timeOffset = 0;
            rhythm.sequence.forEach(item => {
                if (item.type === 'spacer') {
                    timeOffset += 0.3; // пауза
                    return;
                }
                
                const isLong = item.type === 'long';
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = isLong ? 620 : 1050;
                
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.25, now + timeOffset);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + timeOffset + (isLong ? 0.28 : 0.09));
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now + timeOffset);
                osc.stop(now + timeOffset + (isLong ? 0.32 : 0.12));
                
                timeOffset += isLong ? 0.45 : 0.22;
            });
            
            setTimeout(() => {
                isPlaying = false;
                playBtn.classList.remove('playing');
                playBtn.textContent = '🥁 Простучать ритм';
                ctx.close();
            }, timeOffset * 1000 + 500);
        }

        function checkSongSelection(songId) {
            if (isCompleted) return;
            
            const currentRhythm = rhythms[currentIndex];
            
            // Убираем предыдущие подсветки
            document.querySelectorAll('.song-card').forEach(card => {
                card.classList.remove('selected', 'correct', 'incorrect');
            });
            
            // Находим выбранную карточку
            const selectedCard = document.querySelector(`.song-card [data-song-id="${songId}"]`)?.closest('.song-card');
            
            if (songId === currentRhythm.correctSongId) {
                if (selectedCard) selectedCard.classList.add('correct');
                songFeedback.innerHTML = '🎉 Браво! Ритмы подобраны верно! 🎉';
                songFeedback.style.color = '#2d6a1e';
                correctAnswers[currentIndex] = true;
                selectedSongForCurrentRhythm = songId;
                
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.5 } });
                }
            } else {
                if (selectedCard) selectedCard.classList.add('incorrect');
                songFeedback.innerHTML = '🤔 Попробуй еще раз. Послушай внимательнее.';
                songFeedback.style.color = '#b13e3e';
                correctAnswers[currentIndex] = false;
                selectedSongForCurrentRhythm = null;
                
                // Сбрасываем подсветку через 1 секунду
                setTimeout(() => {
                    if (selectedCard) selectedCard.classList.remove('incorrect');
                }, 1000);
            }
        }

        function renderSongs() {
            let html = '';
            songs.forEach(song => {
                html += `
                    <div class="song-card" role="listitem" aria-label="${song.name}">
                        <div class="song-name">${song.name}</div>
                        <div class="song-buttons">
                            <button class="song-btn listen-btn" data-song-id="${song.id}" aria-label="Слушать ${song.name}">▶ Слушать</button>
                            <button class="song-btn choose-btn" data-song-id="${song.id}" aria-label="Выбрать ${song.name}">✅ Выбрать</button>
                        </div>
                    </div>
                `;
            });
            songsGrid.innerHTML = html;
            songFeedback.innerHTML = '';

            // Обработчики для кнопок "Слушать"
            document.querySelectorAll('.listen-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = e.currentTarget.getAttribute('data-song-id');
                    const song = songs.find(s => s.id === id);
                    if (song) playSong(song, e.currentTarget);
                });
            });

            // Обработчики для кнопок "Выбрать"
            document.querySelectorAll('.choose-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = e.currentTarget.getAttribute('data-song-id');
                    checkSongSelection(id);
                });
            });
        }

        function updateLegend(rhythm) {
            legendContainer.innerHTML = `
                <div class="legend-item">
                    <span class="legend-fruit" aria-hidden="true">${rhythm.longSymbol}</span>
                    <span class="legend-text">${legendTextLong}</span>
                </div>
                <div class="legend-item">
                    <span class="legend-fruit" aria-hidden="true">${rhythm.shortSymbol}</span>
                    <span class="legend-text">${legendTextShort}</span>
                </div>
            `;
        }

        function renderRhythm() {
            const rhythm = rhythms[currentIndex];
            rhythmTitle.textContent = rhythm.title;
            messageBubble.innerHTML = rhythm.message;

            // Останавливаем аудио при смене ритма
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                document.querySelectorAll('.listen-btn.playing').forEach(btn => {
                    btn.classList.remove('playing');
                    btn.textContent = '▶ Слушать';
                });
            }

            let html = '';
            let groupItems = [];

            rhythm.sequence.forEach((item, index) => {
                if (item.type === 'spacer') {
                    // Закрываем предыдущую группу
                    if (groupItems.length > 0) {
                        html += `<li class="rhythm-group">${groupItems.join('')}</li>`;
                        groupItems = [];
                    }
                    // Добавляем spacer как разделитель
                    html += `<li class="rhythm-item spacer" aria-hidden="true"></li>`;
                } else {
                    // Добавляем элемент в текущую группу
                    groupItems.push(`
                        <div class="rhythm-item ${item.type}">
                            <span class="rhythm-syllable">${item.syllable}</span>
                            <span class="rhythm-fruit" aria-hidden="true">${item.symbol}</span>
                            <span class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">
                                ${item.type === 'long' ? 'Длинный звук ТА' : 'Короткий звук ТИ'}
                            </span>
                        </div>
                    `);
                }

                // Закрываем последнюю группу
                if (index === rhythm.sequence.length - 1 && groupItems.length > 0) {
                    html += `<li class="rhythm-group">${groupItems.join('')}</li>`;
                }
            });

            rhythmRow.innerHTML = html;
            updateLegend(rhythm);
            counterDisplay.textContent = `${currentIndex + 1} / ${rhythms.length}`;

            // Сброс выбора
            selectedSongForCurrentRhythm = null;
            document.querySelectorAll('.song-card').forEach(card => {
                card.classList.remove('selected', 'correct', 'incorrect');
            });
            songFeedback.innerHTML = '';

            // Обновляем кнопки
            prevBtn.disabled = currentIndex === 0 || isCompleted;

            if (currentIndex === rhythms.length - 1) {
                nextBtn.textContent = '🏁 ЗАВЕРШИТЬ';
                nextBtn.setAttribute('aria-label', 'Завершить задание');
            } else {
                nextBtn.textContent = 'ВПЕРЁД ▶';
                nextBtn.setAttribute('aria-label', 'Следующий ритм');
            }

            nextBtn.disabled = isCompleted;
            resetBtn.style.display = isCompleted ? 'inline-block' : 'none';
        }

        function completeTask() {
            isCompleted = true;
            completionMessage.textContent = '🎉 Отлично! Задание выполнено! 🎉';
            nextBtn.disabled = true;
            prevBtn.disabled = true;
            resetBtn.style.display = 'inline-block';
            messageBubble.innerHTML = `🐻 <strong>Молодцы, ребята!</strong><br>Вы отлично справились с ритмами! Возвращайтесь на поляну за следующим заданием.`;
            
            saveProgress();
            fireConfetti();
            
            // Останавливаем аудио при завершении
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        }

        function resetTask() {
            isCompleted = false;
            currentIndex = 0;
            correctAnswers = {};
            selectedSongForCurrentRhythm = null;
            completionMessage.textContent = '';
            resetBtn.style.display = 'none';
            
            // Останавливаем аудио
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                document.querySelectorAll('.listen-btn.playing').forEach(btn => {
                    btn.classList.remove('playing');
                    btn.textContent = '▶ Слушать';
                });
            }
            
            renderRhythm();
            rhythmTitle.focus();
        }

        // ===== ОБРАБОТЧИКИ =====

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0 && !isCompleted) {
                currentIndex--;
                renderRhythm();
                completionMessage.textContent = '';
                rhythmTitle.focus();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (isCompleted) return;
            
            if (currentIndex < rhythms.length - 1) {
                currentIndex++;
                renderRhythm();
                completionMessage.textContent = '';
                rhythmTitle.focus();
            } else if (currentIndex === rhythms.length - 1) {
                completeTask();
            }
        });

        resetBtn.addEventListener('click', resetTask);

        playBtn.addEventListener('click', playCurrentRhythm);

        // Клавиатурная навигация
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                prevBtn.click();
            } else if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                nextBtn.click();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                playBtn.click();
            }
        });

        // Анимация ушек медвежонка
        const bear = document.getElementById('bearHead');
        if (bear) {
            bear.addEventListener('mouseenter', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-15deg) scale(1.05)';
                    else e.style.transform = 'rotate(15deg) scale(1.05)';
                });
            });
            bear.addEventListener('mouseleave', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-25deg)';
                    else e.style.transform = 'rotate(25deg)';
                });
            });
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderSongs();
        renderRhythm();

        // Проверяем, было ли задание уже выполнено
        const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
        if (completedTasks.includes(TASK_ID)) {
            isCompleted = true;
            currentIndex = rhythms.length - 1;
            renderRhythm();
            completionMessage.textContent = '🎉 Это задание уже выполнено! Молодцы! 🎉';
            nextBtn.disabled = true;
            prevBtn.disabled = true;
            resetBtn.style.display = 'inline-block';
            messageBubble.innerHTML = `🐻 <strong>Молодцы, ребята!</strong><br>Вы отлично справились с ритмами! Возвращайтесь на поляну за следующим заданием.`;
        }
    })();
</script>
</body>
</html>
