<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐻 Медвежонок · Квест 2 · Задание №2</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard', 'Nunito', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1f4d2b 0%, #3b6e49 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="30" viewBox="0 0 28 30"><circle cx="14" cy="13" r="12" fill="%23ffdb7c" stroke="%23955c1e" stroke-width="2.8"/><circle cx="9" cy="9" r="2.2" fill="black"/><circle cx="19" cy="9" r="2.2" fill="black"/><ellipse cx="14" cy="18" rx="5.5" ry="2.8" fill="%23955c1e" /></svg>') 14 13, auto;
        }

        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #6c9e5f;
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.6), inset 0 0 30px #c6e6a3;
            padding: 25px 25px 35px 25px;
            border: 8px solid #4f7542;
        }

        /* Медвежонок + сообщение */
        .bear-task-section {
            background: #8fc27c;
            border-radius: 100px 100px 50px 50px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 6px solid #fdebbc;
            box-shadow: 0 15px 0 #3b642b, inset 0 0 30px #e9f7d3;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bear-avatar {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 160px;
        }

        .bear-avatar .bear {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #d49d62, #7b4d27);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 15px 0 #5f3e22, inset -10px -12px 15px #8b602f;
            border: 5px solid #573e22;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }
        .bear-avatar .ear {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #b8804a;
            border-radius: 70% 70% 60% 60%;
            top: -30px;
            border: 5px solid #573e22;
            transition: transform 0.2s;
        }
        .bear-avatar .ear.left { left: 1px; transform: rotate(-25deg); }
        .bear-avatar .ear.right { right: 1px; transform: rotate(25deg); }

        .bear-avatar .face {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bear-avatar .eyes {
            display: flex;
            gap: 32px;
        }
        .bear-avatar .eye {
            width: 20px;
            height: 25px;
            background: white;
            border-radius: 50%;
            border: 3px solid #2d1d0c;
            position: relative;
        }
        .bear-avatar .eye::after {
            content: '';
            width: 12px;
            height: 13px;
            background: #2f1f0e;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            left: 4px;
        }
        .bear-avatar .nose {
            width: 30px;
            height: 20px;
            background: #4b3119;
            border-radius: 40% 40% 50% 50%;
            border: 3px solid #2d1d0c;
            margin-top: 7px;
        }

        .speech-bubble {
            position: relative;
            background: #ffffec;
            border-radius: 60px 60px 60px 40px;
            padding: 30px 40px;
            border: 6px solid #6d4f2c;
            box-shadow: 15px 18px 0 rgba(0, 0, 0, 0.2), inset 0 0 0 5px #fffed8;
            max-width: 700px;
            font-size: 1.6rem;
            line-height: 1.5;
            color: #203d16;
            font-weight: 600;
            flex: 1;
            min-width: 300px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -30px;
            bottom: 30px;
            width: 50px;
            height: 50px;
            background: #ffffec;
            border-radius: 50%;
            border: 6px solid #6d4f2c;
            border-top-color: transparent;
            border-right-color: transparent;
            transform: rotate(45deg);
            box-shadow: -8px 8px 0 rgba(0,0,0,0.1);
        }

        /* Ритмический блок */
        .rhythm-block {
            background: #fdf5d6;
            border-radius: 50px;
            padding: 25px 20px;
            margin: 25px 0;
            border: 5px solid #bc9b5a;
            box-shadow: 0 10px 0 #7a6234, inset 0 0 0 5px #fff3c9;
        }

        .rhythm-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .rhythm-subtitle {
            font-size: 1.9rem;
            font-weight: bold;
            color: #5a4a35;
            background: #f7e9c4;
            padding: 8px 30px;
            border-radius: 30px;
        }

        .listen-btn {
            background: #e0916b;
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-weight: bold;
            font-size: 1.4rem;
            border-bottom: 5px solid #9b4f2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.08s;
        }

        .listen-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .rhythm-line {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0;
            font-size: 2.5rem;
            letter-spacing: 3px;
        }

        .rest {
            color: #b0a58a;
            margin: 0 5px;
        }

        .legend-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff9e0;
            padding: 12px 25px;
            border-radius: 40px;
            border: 3px solid #b3823c;
            font-size: 1.3rem;
        }

        .legend-emoji {
            font-size: 2.2rem;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .home-link {
            display: inline-block;
            margin-top: 10px;
            background: #fdebbc;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.6rem;
            color: #284f18;
            border: 5px solid #a57c42;
            box-shadow: 0 8px 0 #6d4f1e;
            text-decoration: none;
            font-weight: bold;
        }

        .play-btn {
            background: #b56532;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 6px solid #6d3f1f;
            cursor: pointer;
            margin: 15px 0;
        }

        .play-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        @media (max-width: 700px) {
            .speech-bubble { font-size: 1.3rem; padding: 20px; }
            .speech-bubble::after { left: 40px; top: -25px; transform: rotate(135deg); }
            .rhythm-line { font-size: 2rem; gap: 6px; }
            .rhythm-header { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- МИШКА И СООБЩЕНИЕ -->
    <div class="bear-task-section">
        <div class="bear-avatar">
            <div class="bear" id="bearHead">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
        <div class="speech-bubble" id="messageBubble">
            🐻 Для следующего задания вам тоже понадобятся ваши ладошки! <br>
            Послушайте песню, которую мы будем разучивать, а после простучите её ритмический рисунок, вы увидите его на экране!
        </div>
    </div>

    <!-- РИТМИЧЕСКИЙ РИСУНОК: 1 КУПЛЕТ -->
    <div class="rhythm-block">
        <div class="rhythm-header">
            <div class="rhythm-subtitle">🎵 1 куплет</div>
            <button class="listen-btn" id="listenVerseBtn">🎧 Слушать куплет</button>
        </div>
        <div class="rhythm-line" id="verseLine1"></div>
        <div class="rhythm-line" id="verseLine2"></div>
        <div class="rhythm-line" id="verseLine3"></div>
        <div class="rhythm-line" id="verseLine4"></div>
    </div>

    <!-- РИТМИЧЕСКИЙ РИСУНОК: ПРИПЕВ -->
    <div class="rhythm-block">
        <div class="rhythm-header">
            <div class="rhythm-subtitle">🎶 Припев</div>
            <button class="listen-btn" id="listenChorusBtn">🎧 Слушать припев</button>
        </div>
        <div class="rhythm-line" id="chorusLine1"></div>
        <div class="rhythm-line" id="chorusLine2"></div>
        <div class="rhythm-line" id="chorusLine3"></div>
        <div class="rhythm-line" id="chorusLine4"></div>
    </div>

    <!-- ЛЕГЕНДА -->
    <div class="legend-box">
        <div class="legend-item">
            <span class="legend-emoji">🌸</span>
            <span>Длинный звук (ТА) — шлёпаем по коленкам</span>
        </div>
        <div class="legend-item">
            <span class="legend-emoji">🐝</span>
            <span>Короткий звук (ТИ) — хлопаем в ладоши</span>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="action-area">
        <a href="index.html?level=1" class="home-link">🏡 На поляну</a>
    </div>
</div>

<script>
    (function(){
        // Данные ритмов
        const verseLines = [
            ['🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🌸'],
            ['🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🐝', '🌸', '🐝', '🌸'],
            ['🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🌸'],
            ['🌸', '🐝', '🐝', '🐝', '🌸', '🐝', '🐝', '🐝', '🌸']
        ];

        const chorusLines = [
            ['🐝', '🐝', '🐝', '🌸', '🌸', null, '🐝', '🐝', '🌸', '🐝', '🌸', '🐝', '🌸', '🌸'],
            ['🌸', '🐝', '🐝', '🐝', '🐝', '🐝', '🌸', '🌸', null, '🐝', '🐝', '🐝', '🐝'],
            ['🐝', '🐝', '🐝', '🌸', '🌸', null, '🐝', '🐝', '🌸', '🐝', '🌸', '🐝', '🌸', '🌸'],
            ['🐝', '🐝', '🐝', '🌸', '🌸', null, '🐝', '🐝', '🌸', '🐝', '🌸', '🐝', '🌸']
        ];

        function renderLine(containerId, symbols) {
            const container = document.getElementById(containerId);
            let html = '';
            symbols.forEach(sym => {
                if (sym === null) {
                    html += '<span class="rest">&nbsp;&nbsp;&nbsp;</span>';
                } else {
                    html += `<span>${sym}</span>`;
                }
            });
            container.innerHTML = html;
        }

        // Отрисовка всех строк
        renderLine('verseLine1', verseLines[0]);
        renderLine('verseLine2', verseLines[1]);
        renderLine('verseLine3', verseLines[2]);
        renderLine('verseLine4', verseLines[3]);

        renderLine('chorusLine1', chorusLines[0]);
        renderLine('chorusLine2', chorusLines[1]);
        renderLine('chorusLine3', chorusLines[2]);
        renderLine('chorusLine4', chorusLines[3]);

        // Функция проигрывания ритма
        function playRhythm(lines) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;

            function scheduleTone(time, isLong) {
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = isLong ? 600 : 1000;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.25, time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, time + (isLong ? 0.28 : 0.09));
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(time);
                osc.stop(time + (isLong ? 0.32 : 0.12));
            }

            let timeOffset = 0;
            lines.forEach(line => {
                line.forEach(sym => {
                    if (sym === null) {
                        timeOffset += 0.15;
                        return;
                    }
                    const isLong = sym === '🌸';
                    scheduleTone(now + timeOffset, isLong);
                    timeOffset += isLong ? 0.45 : 0.22;
                });
                timeOffset += 0.25;
            });
        }

        // Мелодия куплета — более спокойная, плавная
        function playVerseMelody() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;

            const melody = [
                { freq: 349.23, dur: 0.5 },
                { freq: 392.00, dur: 0.3 },
                { freq: 349.23, dur: 0.4 },
                { freq: 330.00, dur: 0.3 },
                { freq: 294.00, dur: 0.5 },
                { freq: 330.00, dur: 0.3 },
                { freq: 349.23, dur: 0.6 },
                { freq: 392.00, dur: 0.4 },
                { freq: 349.23, dur: 0.3 },
                { freq: 330.00, dur: 0.5 },
                { freq: 294.00, dur: 0.4 },
                { freq: 262.00, dur: 0.6 },
            ];

            let time = 0;
            melody.forEach(note => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = note.freq;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.18, now + time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + time + note.dur);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now + time);
                osc.stop(now + time + note.dur + 0.05);
                time += note.dur;
            });
        }

        // Мелодия припева — более энергичная, танцевальная
        function playChorusMelody() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;

            const melody = [
                { freq: 440.00, dur: 0.2 },
                { freq: 493.88, dur: 0.2 },
                { freq: 523.25, dur: 0.4 },
                { freq: 493.88, dur: 0.2 },
                { freq: 440.00, dur: 0.3 },
                { freq: 392.00, dur: 0.5 },
                { freq: 440.00, dur: 0.2 },
                { freq: 493.88, dur: 0.2 },
                { freq: 523.25, dur: 0.3 },
                { freq: 587.33, dur: 0.4 },
                { freq: 523.25, dur: 0.2 },
                { freq: 493.88, dur: 0.3 },
                { freq: 440.00, dur: 0.6 },
            ];

            let time = 0;
            melody.forEach(note => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = note.freq;
                const gainNode = ctx.createGain();
                gainNode.gain.setValueAtTime(0.2, now + time);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + time + note.dur);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start(now + time);
                osc.stop(now + time + note.dur + 0.05);
                time += note.dur;
            });
        }

        // Обработчики кнопок
        document.getElementById('listenVerseBtn').addEventListener('click', () => {
            playVerseMelody();
            const btn = document.getElementById('listenVerseBtn');
            btn.style.transform = 'scale(0.94)';
            setTimeout(() => { btn.style.transform = ''; }, 150);
        });

        document.getElementById('listenChorusBtn').addEventListener('click', () => {
            playChorusMelody();
            const btn = document.getElementById('listenChorusBtn');
            btn.style.transform = 'scale(0.94)';
            setTimeout(() => { btn.style.transform = ''; }, 150);
        });

        document.getElementById('playVerseBtn').addEventListener('click', () => {
            playRhythm(verseLines);
        });

        document.getElementById('playChorusBtn').addEventListener('click', () => {
            playRhythm(chorusLines);
        });

        // Анимация ушек
        const bear = document.getElementById('bearHead');
        if (bear) {
            bear.addEventListener('mouseenter', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-15deg) scale(1.05)';
                    else e.style.transform = 'rotate(15deg) scale(1.05)';
                });
            });
            bear.addEventListener('mouseleave', () => {
                bear.querySelectorAll('.ear').forEach(e => {
                    if (e.classList.contains('left')) e.style.transform = 'rotate(-25deg)';
                    else e.style.transform = 'rotate(25deg)';
                });
            });
        }
    })();
</script>
</body>
</html>
