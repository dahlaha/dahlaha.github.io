<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Музыкальный квест «Спаси ритм!» — задание №5. Разучиваем песню с ритмическим аккомпанементом из хлопков и щелчков.">
    <title>🐻 Медвежонок · Станция №5 · Песня</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .game-wrapper {
            max-width: 1300px;
            display: flex;
            flex-direction: column;
        }

        /* Окошко с текстом песни – моноширинный шрифт для точного выравнивания ритма */
        .lyrics-box {
            background: #fff9e0;
            border-radius: 50px;
            padding: 20px 25px;
            margin: 20px 0 25px;
            border: 5px solid #c9a04b;
            box-shadow: 0 12px 0 #9e7a42, inset 0 0 0 6px #fff3c9;
            font-family: 'Courier New', 'Lucida Console', monospace;
            font-size: 1.6rem;
            line-height: 0.5;
            color: #3a2e22;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 180px;
        }

        /* Каждая пара «ритмические значки + строка текста» */
        .rhythm-line {
            margin-bottom: 0.1px;
        }

        .rhythm-marks {
            font-size: 1.6rem;
            letter-spacing: 1px;
            line-height: 0.9;
            color: #b45f06;
            
        }

        .lyric-text {
            font-size: 1.6rem;
            font-weight: 600;
            color: #3a2e22;
            
            line-height: 0.9;
        }

        /* Блок действий */
        .action-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }

        .left-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .right-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-left: auto;
            flex-wrap: wrap;
        }

        .nav-btn, .finish-btn, .reset-btn {
            font-size: 2rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 60px;
            border: 6px solid #b8782e;
            box-shadow: 0 12px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
            color: #2c4d1c;
            cursor: pointer;
            transition: 0.08s;
            background: #fdd673;
            user-select: none;
        }

        .reset-btn {
            background: #afd69b;
            border-color: #527a3e;
            box-shadow: 0 12px 0 #3b642b, inset 0 0 0 5px #e2ffc7;
        }

        .finish-btn {
            background: #ffb347;
            border-color: #c56a1a;
            box-shadow: 0 12px 0 #9a4e14, inset 0 0 0 5px #ffe4a0;
            color: #3e260f;
        }

        .nav-btn:hover:not(:disabled),
        .finish-btn:hover:not(:disabled),
        .reset-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 14px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
        }

        .nav-btn:active:not(:disabled),
        .finish-btn:active:not(:disabled),
        .reset-btn:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #8a5a24, inset 0 0 0 5px #fff2bf;
        }

        .finish-btn:disabled,
        .nav-btn:disabled,
        .reset-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .home-link {
            display: inline-block;
            background: #fdebbc;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.6rem;
            color: #284f18;
            border: 5px solid #a57c42;
            box-shadow: 0 8px 0 #6d4f1e;
            text-decoration: none;
            font-weight: bold;
            transition: 0.1s;
        }

        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #6d4f1e;
        }

        .home-link:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #6d4f1e;
        }

        .complete-message {
            text-align: center;
            font-size: 2rem;
            color: #fbf5b0;
            text-shadow: 3px 3px 0 #1c481c;
            margin: 20px 0 10px;
            min-height: 60px;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .lyrics-box {
                font-size: 1rem;
                padding: 15px;
            }
            .rhythm-marks {
                font-size: 1rem;
            }
            .lyric-text {
                font-size: 1rem;
            }
        }

        @media (max-width: 400px) {
            .lyrics-box {
                font-size: 0.9rem;
                padding: 12px;
            }
            .rhythm-marks {
                font-size: 0.9rem;
                letter-spacing: 0.5px;
            }
            .lyric-text {
                font-size: 0.9rem;
            }
            .rhythm-line {
                margin-bottom: 2px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- МЕДВЕЖОНОК + СООБЩЕНИЕ -->
    <section class="bear-section" aria-label="Медвежонок даёт задание">
        <div class="bear-avatar" aria-hidden="true">
            <div class="bear">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
        <div class="speech-bubble" id="messageBubble">
            🐻 Перед вами текст песни, которую мы будем сегодня разучивать. Прочитайте его выразительно вместе с учителем!
        </div>
    </section>

    <!-- ОКНО С ТЕКСТОМ ПЕСНИ -->
    <div class="lyrics-box" id="lyricsBox" aria-live="polite"></div>

        <!-- НАВИГАЦИЯ -->
    <div class="action-area">
        <div class="left-actions">
            <a href="index.html?level=1" class="home-link" aria-label="Вернуться на поляну">🏡 На поляну</a>
            <button class="reset-btn" id="resetBtn" aria-label="Начать задание заново">🔄 Обновить задание</button>
        </div>
        <div class="right-actions">
            <button class="nav-btn" id="prevBtn" aria-label="Назад" disabled>◀ НАЗАД</button>
            <button class="nav-btn" id="nextBtn" aria-label="Далее">ДАЛЕЕ ▶</button>
            <button class="finish-btn" id="finishBtn" style="display: none;" aria-label="Завершить задание">🎉 ЗАВЕРШИТЬ</button>
        </div>
    </div>
    <div id="completionMessage" class="complete-message" aria-live="polite"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1" defer></script>
<script>
    (function(){
        "use strict";
        const prevBtn = document.getElementById('prevBtn');
        const TASK_ID = 'task5.html';

        // Шаги задания с точным ритмическим рисунком
        const steps = [
            {
                message: `🐻 <strong>Перед вами текст песни, которую мы будем сегодня разучивать.</strong><br>Прочитайте его выразительно вместе с учителем!`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>1 куплет:</strong></div></div>
                    <div class="rhythm-line"><div class="lyric-text">Что за музыка на улице слышна?</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Это снова на дворе поёт весна.</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Птичьи трели засвистели и капели зазвенели,</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Светлой музыкой вся улица полна</div></div>
                `
            },
            {
                message: `🐻 <strong>Сейчас вам вновь понадобятся ваши ладошки!</strong><br>Посмотрите на куплет – над ним появились ладошки, которые подсказывают, когда нужно хлопать.<br>Прохлопайте вместе с учителем!`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>1 куплет:</strong></div></div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">           👏             👏            👏</div>
                        <div class="lyric-text">Что за музыка на улице слышна?</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">       👏          👏                👏</div>
                        <div class="lyric-text">Это снова на дворе поёт весна.</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">             👏              👏           👏          👏</div>
                        <div class="lyric-text">Птичьи трели засвистели и капели зазвенели,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">👏          👏              👏           👏</div>
                        <div class="lyric-text">Светлой музыкой вся улица полна</div>
                    </div>
                `
            },
            {
                message: `🐻 <strong>А теперь к хлопкам добавятся щелчки, которые заполнят паузы!</strong><br>Воспроизведите этот ритм вместе с учителем!`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>1 куплет:</strong></div></div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">           👏             👏            👏        👌👌</div>
                        <div class="lyric-text">Что за музыка на улице слышна?</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">       👏          👏                👏           👌👌</div>
                        <div class="lyric-text">Это снова на дворе поёт весна.</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">             👏              👏           👏          👏       👌</div>
                        <div class="lyric-text">Птичьи трели засвистели и капели зазвенели,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">👏          👏              👏           👏</div>
                        <div class="lyric-text">Светлой музыкой вся улица полна</div>
                    </div>
                `
            },
            {
                message: `🐻 <strong>К куплету добавляется припев!</strong><br>Прочитайте его выразительно!`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>Припев:</strong></div></div>
                    <div class="rhythm-line"><div class="lyric-text">Открывайте шире двери,</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Просыпайтесь, птицы, звери.</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Отступила злая зимушка-зима,</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Позабыли мы про стужу,</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Стали нам совсем не нужны</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Холод и немая тишина,</div></div>
                    <div class="rhythm-line"><div class="lyric-text">Зимний холод и немая тишина</div></div>
                `
            },
            {
                message: `🐻 <strong>Добавим сразу хлопки и щелчки, что заполнят паузы, как в куплете!</strong>`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>Припев:</strong></div></div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">          👏      👏     👏         👌👌</div>
                        <div class="lyric-text">Открывайте шире двери,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">           👏          👏       👏        👌👌</div>
                        <div class="lyric-text">Просыпайтесь, птицы, звери.</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">         👏           👏              👏 👏 👏</div>
                        <div class="lyric-text">Отступила злая зимушка-зима - а - а,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">        👏                 👏</div>
                        <div class="lyric-text">Позабыли мы про стужу,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">          👏                   👏         👌</div>
                        <div class="lyric-text">Стали нам совсем не нужны</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">👏              👏         👏    👌👌</div>
                        <div class="lyric-text">Холод и немая тишина,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">             👏            👏          👏</div>
                        <div class="lyric-text">Зимний холод и немая тишина</div>
                    </div>
                `
            },
            {
                message: `🐻 <strong>А теперь соединим первый куплет и припев!</strong>`,
                lyricsHTML: `
                    <div class="rhythm-line"><div class="lyric-text"><strong>1 куплет:</strong></div></div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">           👏             👏            👏        👌👌</div>
                        <div class="lyric-text">Что за музыка на улице слышна?</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">       👏          👏                👏           👌👌</div>
                        <div class="lyric-text">Это снова на дворе поёт весна.</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">             👏              👏           👏          👏       👌</div>
                        <div class="lyric-text">Птичьи трели засвистели и капели зазвенели,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">👏          👏              👏           👏</div>
                        <div class="lyric-text">Светлой музыкой вся улица полна</div>
                    </div>
                    <div class="rhythm-line" style="margin-top: 20px;"><div class="lyric-text"><strong>Припев:</strong></div></div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">          👏      👏     👏         👌👌</div>
                        <div class="lyric-text">Открывайте шире двери,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">           👏          👏       👏        👌👌</div>
                        <div class="lyric-text">Просыпайтесь, птицы, звери.</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">         👏           👏              👏 👏 👏</div>
                        <div class="lyric-text">Отступила злая зимушка-зима - а - а,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">        👏                 👏</div>
                        <div class="lyric-text">Позабыли мы про стужу,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">          👏                   👏         👌</div>
                        <div class="lyric-text">Стали нам совсем не нужны</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">👏              👏         👏    👌👌</div>
                        <div class="lyric-text">Холод и немая тишина,</div>
                    </div>
                    <div class="rhythm-line">
                        <div class="rhythm-marks">             👏            👏          👏</div>
                        <div class="lyric-text">Зимний холод и немая тишина</div>
                    </div>
                `
            }
        ];

        let currentStep = 0;
        let isCompleted = false;

        const messageBubble = document.getElementById('messageBubble');
        const lyricsBox = document.getElementById('lyricsBox');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const completionMessage = document.getElementById('completionMessage');
        const resetBtn = document.getElementById('resetBtn');

        function renderStep() {
            const step = steps[currentStep];
            messageBubble.innerHTML = step.message;
            lyricsBox.innerHTML = step.lyricsHTML;

            // Обновляем кнопку НАЗАД
            prevBtn.disabled = currentStep === 0 || isCompleted;

            if (currentStep === steps.length - 1) {
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'inline-block';
            } else {
                nextBtn.style.display = 'inline-block';
                finishBtn.style.display = 'none';
            }

            completionMessage.textContent = '';
            if (isCompleted) {
                prevBtn.disabled = true;
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'none';
                completionMessage.textContent = '🎉 Отлично! Песня готова! Вы справились! 🎉';
            }
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentStep > 0 && !isCompleted) {
                currentStep--;
                renderStep();
            }
        });

        function completeTask() {
            if (isCompleted) return;
            isCompleted = true;

            const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
            if (!completedTasks.includes(TASK_ID)) {
                completedTasks.push(TASK_ID);
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }

            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => confetti({ particleCount: 120, spread: 80, origin: { y: 0.6, x: 0.3 } }), 100);
                setTimeout(() => confetti({ particleCount: 120, spread: 80, origin: { y: 0.6, x: 0.7 } }), 200);
            }

            completionMessage.textContent = '🎉 Отлично! Песня готова! Вы справились! 🎉';
            finishBtn.disabled = true;
            prevBtn.disabled = true;
            messageBubble.innerHTML = `🐻 <strong>Молодцы, ребята!</strong><br>Теперь мы можем спеть всю песню с ритмическим аккомпанементом! Возвращайтесь на поляну за следующим заданием.`;
        }

        function resetTask() {
            isCompleted = false;
            currentStep = 0;
            finishBtn.disabled = false;
            prevBtn.disabled = true;
            renderStep();
            messageBubble.innerHTML = steps[0].message;
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < steps.length - 1 && !isCompleted) {
                currentStep++;
                renderStep();
            }
        });

        finishBtn.addEventListener('click', () => {
            if (!isCompleted && currentStep === steps.length - 1) {
                completeTask();
            }
        });

        resetBtn.addEventListener('click', resetTask);

        // Инициализация
        renderStep();

        // Проверяем, было ли задание выполнено ранее
        const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
        if (completedTasks.includes(TASK_ID)) {
            currentStep = steps.length - 1;
            isCompleted = true;
            renderStep();
            finishBtn.disabled = true;
            nextBtn.style.display = 'none';
            completionMessage.textContent = '🎉 Это задание уже выполнено! Молодцы! 🎉';
            messageBubble.innerHTML = `🐻 <strong>Молодцы, ребята!</strong><br>Теперь мы можем спеть всю песню с ритмическим аккомпанементом! Возвращайтесь на поляну за следующим заданием.`;
        }
    })();
</script>
</body>
</html>
