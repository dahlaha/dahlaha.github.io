<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Музыкальный квест «Спаси ритм!» — задание №1. Помогите медвежонку простучать ритмические рисунки с длинными и короткими звуками.">
    <title>Медвежонок · Станция №1</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ===== УНИКАЛЬНЫЕ СТИЛИ СТРАНИЦЫ ЗАДАНИЯ ===== */
        
        /* Ритмический рисунок */
        .rhythm-section {
            background: #fdf5d6;
            border-radius: 60px;
            padding: 35px 30px;
            margin: 20px 0;
            border: 5px solid #bc9b5a;
            box-shadow: 0 10px 0 #7a6234, inset 0 0 0 6px #fff3c9;
        }
        .rhythm-item.spacer {
            opacity: 0;
            pointer-events: none;
            min-width: 30px;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .rhythm-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #4a3f35;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0 #e8d5b5;
            outline: none;
        }

        .rhythm-list {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            list-style: none;
            padding: 0;
        }

        .rhythm-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff1d2;
            padding: 10px 15px;
            border-radius: 35px;
            border: 4px solid #a67934;
            box-shadow: inset 0 0 0 4px #ffe3a5, 0 6px 0 #846f3e;
            min-width: 100px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .rhythm-item.long {
            background: #fff9e0;
            border-color: #8b6914;
        }

        .rhythm-item.short {
            background: #ffe8e0;
            border-color: #c44d34;
        }

        .rhythm-syllable {
            font-size: 2.0rem;
            font-weight: bold;
            color: #5a4a3a;
        }

        .rhythm-fruit {
            font-size: 2.0rem;
            filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
        }

        /* Легенда */
        .legend-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff9e0;
            padding: 12px 25px;
            border-radius: 40px;
            border: 3px solid #b3823c;
        }

        .legend-fruit {
            font-size: 2.5rem;
        }

        .legend-text {
            font-size: 1.3rem;
            color: #3a2e22;
        }

        /* Кнопки */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .nav-btn {
            font-size: 2rem;
            padding: 15px 45px;
        }

        .counter {
            font-size: 1.8rem;
            color: #faf0b0;
            text-shadow: 3px 3px 0 #3f6d2b;
            margin: 10px 0;
            font-weight: bold;
        }

        .play-btn {
            background: #b56532;
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            border-bottom: 6px solid #6d3f1f;
            transition: 0.08s;
            margin: 10px 0;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #c97845;
        }

        .play-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        .play-btn.playing {
            background: #4caf50;
            border-bottom-color: #2e7d32;
            animation: playingPulse 0.5s infinite;
        }

        @keyframes playingPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .complete-message {
            text-align: center;
            font-size: 2rem;
            color: #fbf5b0;
            text-shadow: 3px 3px 0 #1c481c;
            margin: 20px 0;
            min-height: 60px;
            transition: opacity 0.3s;
        }

        /* Скрытый текст для скринридеров */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        /* Адаптивность страницы задания */
        @media (max-width: 800px) {
            .rhythm-item { 
                min-width: 80px; 
                padding: 10px 15px; 
            }
            .rhythm-syllable { 
                font-size: 1.8rem; 
            }
            .rhythm-fruit { 
                font-size: 2.5rem; 
            }
            .nav-btn { 
                font-size: 1.5rem; 
                padding: 12px 30px; 
            }
            .play-btn {
                font-size: 1.2rem;
                padding: 12px 25px;
            }
            .legend-box {
                gap: 15px;
            }
            .legend-item {
                padding: 10px 15px;
            }
            .legend-text {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .rhythm-list {
                gap: 8px;
            }
            .rhythm-item {
                min-width: 60px;
                padding: 8px 10px;
            }
            .rhythm-syllable {
                font-size: 1.4rem;
            }
            .rhythm-fruit {
                font-size: 1.8rem;
            }
            .nav-buttons {
                gap: 15px;
            }
            .nav-btn {
                font-size: 1.2rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- МЕДВЕЖОНОК + СООБЩЕНИЕ -->
    <section class="bear-section" aria-label="Медвежонок даёт задание">
        <div class="bear-avatar" aria-hidden="true">
            <div class="bear">
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="face">
                    <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
        <div class="speech-bubble" id="messageBubble">
            🐻 <strong>Ну что, ребята, готовы?</strong><br>
            Вот и первое задание! Посмотрите на ритмические рисунки. 
            Звуки бывают длинные (🍏 яблоко) и короткие (🍓 клубничка).
        </div>
    </section>

    <!-- РИТМИЧЕСКИЙ РИСУНОК -->
    <div class="rhythm-section" id="rhythmDisplay">
        <h2 class="rhythm-title" id="rhythmTitle" tabindex="-1">🎵 Ритм 1 🎵</h2>
        <ol class="rhythm-list" id="rhythmRow" aria-label="Ритмическая последовательность"></ol>
        <div style="text-align: center;">
            <button class="play-btn" id="playRhythmBtn" aria-label="Простучать ритм">
                🥁 Простучать ритм
            </button>
        </div>
    </div>

    <!-- ЛЕГЕНДА -->
    <div class="legend-box" aria-label="Обозначения звуков">
        <div class="legend-item">
            <span class="legend-fruit" aria-hidden="true">🍏</span>
            <span class="legend-text">Длинный звук (ТА) — шлёпаем по коленкам</span>
        </div>
        <div class="legend-item">
            <span class="legend-fruit" aria-hidden="true">🍓</span>
            <span class="legend-text">Короткий звук (ТИ) — хлопаем в ладоши</span>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="action-area">
        <div class="counter" id="counterDisplay" aria-live="polite">1 / 3</div>
        <div class="nav-buttons">
            <button class="nav-btn btn-primary" id="prevBtn" disabled aria-label="Предыдущий ритм">◀ НАЗАД</button>
            <button class="nav-btn btn-primary" id="nextBtn" aria-label="Следующий ритм">ВПЕРЁД ▶</button>
        </div>
        <div id="completionMessage" class="complete-message" aria-live="polite"></div>
        <button class="reset-btn" id="resetBtn" style="display: none;" aria-label="Пройти задание заново">
            🔄 Пройти заново
        </button>
        <a href="index.html" class="home-link" aria-label="Вернуться на поляну">🏡 На поляну</a>
    </div>
</div>

<!-- Подключаем confetti в конце body -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1" defer></script>

<script>
    (function(){
        // Константа — идентификатор текущего задания
        const TASK_ID = 'task1.html';
        
        // Данные ритмов
        const rhythms = [
            {
                title: '🎵 Ритм 1 🎵',
                items: [
                    { syllable: 'ТА', fruit: '🍏', type: 'long' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' }
                ],
                message: `🐻 <strong>Ну что, ребята, готовы?</strong><br>
                    Вот и первое задание! Посмотрите на ритмический рисунок. 
                    Попробуйте его простучать!`
            },
            {
                title: '🎵 Ритм 2 🎵',
                items: [
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' }
                ],
                message: `🐻 <strong>Отлично получается!</strong><br>
                    А вот второй ритм. Обратите внимание — здесь больше коротких звуков!`
            },
            {
                title: '🎵 Ритм 3 🎵',
                items: [
                    { syllable: 'ТА', fruit: '🍏', type: 'long' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: 'ТИ', fruit: '🍓', type: 'short' },
                    { syllable: '', fruit: '', type: 'spacer' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' },
                    { syllable: 'ТА', fruit: '🍏', type: 'long' }
                ],
                message: `🐻 <strong>Последний ритм!</strong><br>
                    Он самый сложный. Справитесь?`
            }
        ];

        let currentIndex = 0;
        let isCompleted = false;
        let isPlaying = false;
        let playTimeout = null;

        const rhythmTitle = document.getElementById('rhythmTitle');
        const rhythmRow = document.getElementById('rhythmRow');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const counterDisplay = document.getElementById('counterDisplay');
        const completionMessage = document.getElementById('completionMessage');
        const messageBubble = document.getElementById('messageBubble');
        const playBtn = document.getElementById('playRhythmBtn');

        // ===== ФУНКЦИИ =====

        function saveProgress() {
            const completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '[]');
            if (!completedTasks.includes(TASK_ID)) {
                completedTasks.push(TASK_ID);
                localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
            }
        }

        function fireConfetti() {
            if (typeof confetti !== 'function') {
                console.warn('Confetti ещё не загружен');
                return;
            }
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 }
            });
            
            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6, x: 0.3 }
                });
            }, 100);
            
            setTimeout(() => {
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6, x: 0.7 }
                });
            }, 200);
        }

        function playCurrentRhythm() {
            if (isPlaying) return;
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) {
                    alert('Ваш браузер не поддерживает воспроизведение звука');
                    return;
                }
                
                const ctx = new AudioContext();
                
                if (ctx.state === 'suspended') {
                    ctx.resume().then(() => {
                        startPlayback(ctx);
                    }).catch(err => {
                        console.error('Не удалось запустить аудио:', err);
                        alert('Не удалось воспроизвести звук. Попробуйте ещё раз.');
                    });
                } else {
                    startPlayback(ctx);
                }
            } catch (error) {
                console.error('Ошибка AudioContext:', error);
                alert('Произошла ошибка при воспроизведении звука');
            }
        }

        function startPlayback(ctx) {
            isPlaying = true;
            playBtn.classList.add('playing');
            playBtn.textContent = '🔊 Играет...';

            const now = ctx.currentTime;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.3, now);
            gain.connect(ctx.destination);

            const rhythm = rhythms[currentIndex];

            // Вычисляем общую длительность с учётом пауз
            let totalDuration = 0;
            let timeOffset = 0;

            rhythm.items.forEach((item, idx) => {
                if (idx > 0) {
                    const prevItem = rhythm.items[idx - 1];
                    if (prevItem.type === 'spacer') {
                        // Добавляем паузу после spacer (0.8 секунды тишины)
                        timeOffset += 0.3;
                    } else {
                        timeOffset += prevItem.type === 'long' ? 0.5 : 0.25;
                    }
                }

                // Пропускаем spacer (не создаём звук)
                if (item.type === 'spacer') {
                    totalDuration = timeOffset;
                    return;
                }

                const isLong = item.type === 'long';
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = isLong ? 600 : 1000;

                const g = ctx.createGain();
                g.gain.setValueAtTime(0.2, now + timeOffset);
                g.gain.exponentialRampToValueAtTime(0.001, now + timeOffset + (isLong ? 0.3 : 0.1));

                osc.connect(g);
                g.connect(gain);
                osc.start(now + timeOffset);
                osc.stop(now + timeOffset + (isLong ? 0.3 : 0.1));

                totalDuration = timeOffset + (isLong ? 0.3 : 0.1);
            });

            // Сбрасываем состояние кнопки после воспроизведения
            clearTimeout(playTimeout);
            playTimeout = setTimeout(() => {
                isPlaying = false;
                playBtn.classList.remove('playing');
                playBtn.textContent = '🥁 Простучать ритм';
                ctx.close();
            }, (totalDuration + 0.5) * 1000);
        }

        function renderRhythm() {
            const rhythm = rhythms[currentIndex];
            rhythmTitle.textContent = rhythm.title;
            messageBubble.innerHTML = rhythm.message;
            
            let html = '';
            rhythm.items.forEach((item, idx) => {
                if (item.type === 'spacer') {
                    html += `<li class="rhythm-item spacer" aria-hidden="true">
                        <span class="rhythm-syllable" style="opacity: 0;">-</span>
                        <span class="rhythm-fruit" style="opacity: 0;">-</span>
                    </li>`;
                } else {
                    html += `
                        <li class="rhythm-item ${item.type}">
                            <span class="rhythm-syllable">${item.syllable}</span>
                            <span class="rhythm-fruit" aria-hidden="true">${item.fruit}</span>
                            <span class="sr-only">
                                ${item.type === 'long' ? 'Длинный звук ТА' : 'Короткий звук ТИ'}
                            </span>
                        </li>
                    `;
                }
            });
            rhythmRow.innerHTML = html;
            
            counterDisplay.textContent = `${currentIndex + 1} / ${rhythms.length}`;
            
            prevBtn.disabled = currentIndex === 0 || isCompleted;
            
            if (currentIndex === rhythms.length - 1) {
                nextBtn.textContent = '🏁 ЗАВЕРШИТЬ';
                nextBtn.setAttribute('aria-label', 'Завершить задание');
            } else {
                nextBtn.textContent = 'ВПЕРЁД ▶';
                nextBtn.setAttribute('aria-label', 'Следующий ритм');
            }
            
            nextBtn.disabled = isCompleted;
            
            resetBtn.style.display = isCompleted ? 'inline-block' : 'none';
        }

        function completeTask() {
            isCompleted = true;
            completionMessage.textContent = '🎉 Отлично! Задание выполнено! 🎉';
            nextBtn.disabled = true;
            prevBtn.disabled = true;
            resetBtn.style.display = 'inline-block';
            
            saveProgress();
            fireConfetti();
        }

        function resetTask() {
            isCompleted = false;
            currentIndex = 0;
            completionMessage.textContent = '';
            resetBtn.style.display = 'none';
            renderRhythm();
            
            rhythmTitle.focus();
        }

        // ===== ОБРАБОТЧИКИ =====

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0 && !isCompleted) {
                currentIndex--;
                renderRhythm();
                completionMessage.textContent = '';
                rhythmTitle.focus();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (isCompleted) return;
            
            if (currentIndex < rhythms.length - 1) {
                currentIndex++;
                renderRhythm();
                completionMessage.textContent = '';
                rhythmTitle.focus();
            } else if (currentIndex === rhythms.length - 1) {
                completeTask();
            }
        });

        resetBtn.addEventListener('click', resetTask);

        playBtn.addEventListener('click', () => {
            playCurrentRhythm();
        });

        // Клавиатурная навигация
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && !prevBtn.disabled) {
                prevBtn.click();
            } else if (e.key === 'ArrowRight' && !nextBtn.disabled) {
                nextBtn.click();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                playBtn.click();
            }
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderRhythm();
    })();
</script>
</body>
</html>
